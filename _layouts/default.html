<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "AKS PPF 艾鎧斯車漆保護膜" }}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { corePlugins: { preflight: false } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 1. 全站基礎護盾：鎖死黑底白字，防止溢出 */
        body { background-color: #050505; color: #ffffff; margin: 0; padding: 0; overflow-x: hidden; }
        @font-face { font-family: 'YouSheBiaoTiHei'; src: url('https://aks-ppf.github.io/font/YouSheBiaoTiHei-2.ttf') format('truetype'); font-display: swap; }
        .aks-font-youshe { font-family: 'YouSheBiaoTiHei', 'Montserrat', sans-serif; }
        .aks-font-clean { font-family: 'Montserrat', sans-serif; }

        /* 2. 智慧下推空間 (完美解決覆蓋問題！) */
        /* 當 JS 判斷這頁不是透明首頁時，會自動加上 has-solid-header，把內容往下推 85px */
        body.has-solid-header main { padding-top: 85px; }
        @media (max-width: 991px) {
            body.has-solid-header main { padding-top: 68px; }
        }

        /* 3. AKS 客製化導覽列核心 CSS */
        .aks-header { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 9998; background-color: transparent; transition: all 0.3s ease; box-sizing: border-box; }
        .aks-header.is-scrolled { background-color: rgba(5, 5, 5, 0.98); padding: 12px 5%; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .aks-header.is-hidden { transform: translateY(-100%); } /* 滾動收起效果 */
        .aks-header.force-solid { background-color: #050505 !important; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.05); }

        .aks-logo img { transition: height 0.3s ease; display: block; }
        .aks-mobile-toggle { display: none; background: none; border: none; color: white; cursor: pointer; padding: 5px; }
        .aks-logo-desktop { display: none; }
        .aks-logo-mobile { display: none; }

        /* 桌機版選單 */
        @media (min-width: 992px) {
            .aks-logo-desktop { display: block; height: 45px; width: auto; }
            .aks-header.is-scrolled .aks-logo-desktop { height: 38px; }
            .aks-nav { display: flex; align-items: center; gap: 35px; margin: 0; padding: 0; }
            .aks-nav-item { position: relative; list-style: none; margin: 0; padding: 0; }
            .aks-nav-link { color: #ffffff; text-decoration: none; font-weight: 700; font-size: 16px; letter-spacing: 1.5px; transition: color 0.3s ease; padding: 15px 0; display: block; }
            .aks-nav-link:hover { color: #d31212; }
            .aks-dropdown-menu { visibility: hidden; opacity: 0; position: absolute; top: calc(100% + 5px); left: -20px; background-color: rgba(18, 18, 18, 0.98); min-width: 160px; padding: 10px 0; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s ease; }
            .aks-nav-item:hover .aks-dropdown-menu { visibility: visible; opacity: 1; top: 100%; }
            .aks-dropdown-item { display: block; color: #e0e0e0; padding: 12px 20px; font-size: 14px; letter-spacing: 1.5px; white-space: nowrap; transition: all 0.2s ease; }
            .aks-dropdown-item:hover { background-color: #d31212; color: #fff; text-decoration: none; }
            .aks-contact-btn { background-color: #d31212; color: #ffffff !important; padding: 10px 24px; border-radius: 8px; font-weight: 700; text-decoration: none; letter-spacing: 2px; transition: all 0.3s ease; display: inline-block; }
            .aks-contact-btn:hover { background-color: #a80e0e; transform: translateY(-2px); }
        }

        /* 手機版導航條 */
        @media (max-width: 991px) {
            .aks-nav { display: none; }
            .aks-header { padding: 15px 5%; }
            .aks-mobile-toggle { display: block; }
            .aks-logo { position: absolute; left: 50%; transform: translateX(-50%); display: flex; justify-content: center; align-items: center; width: auto; }
            .aks-logo-mobile { display: block !important; height: 32px !important; width: auto !important; margin: 0 auto; }
            .aks-header.is-scrolled .aks-logo-mobile { height: 28px !important; }
        }

        /* 手機全螢幕選單 */
        .aks-mobile-menu { position: fixed; top: 0; right: -100%; width: 100%; height: 100vh; background-color: #050505; z-index: 10000; transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); overflow-y: auto; padding: 80px 30px 40px; box-sizing: border-box; }
        .aks-mobile-menu.is-open { right: 0; }
        .aks-mobile-close { position: absolute; top: 25px; right: 25px; background: none; border: none; color: white; cursor: pointer; padding: 5px; }
        .aks-mobile-item { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .aks-mobile-link { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 20px 0; color: white; font-size: 16px; font-weight: 700; letter-spacing: 1.5px; background: none; border: none; text-align: left; }
        .aks-mobile-sub { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .aks-mobile-sub-inner { padding-bottom: 20px; display: flex; flex-direction: column; gap: 15px; padding-left: 15px; }
        .aks-mobile-sub-link { color: #a0a0a0; font-size: 14px; letter-spacing: 1.5px; transition: color 0.3s ease; }
        .aks-mobile-item.is-active .aks-mobile-sub { max-height: 500px; }
        .aks-mobile-item.is-active .aks-chevron { transform: rotate(180deg); color: #d31212; }
        
        /* 進場動畫引擎 */
        .io-reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.8s cubic-bezier(0.215, 0.61, 0.355, 1), transform 0.8s cubic-bezier(0.215, 0.61, 0.355, 1); }
        .io-reveal.is-in { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    
    {% include header.html %}

    <main class="flex-grow w-full overflow-x-hidden">
        {{ content }}
    </main>

    {% include footer.html %}

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 1. 進場動畫監聽
            const observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) { entry.target.classList.add('is-in'); obs.unobserve(entry.target); }
                });
            }, { root: null, rootMargin: '0px', threshold: 0.15 });
            setTimeout(() => { document.querySelectorAll('.io-reveal').forEach(el => observer.observe(el)); }, 500);

            // 2. 導覽列滾動與智慧判斷邏輯
            const header = document.querySelector('.aks-header');
            if (header) {
                const path = window.location.pathname;
                
                // 🔥 新架構的「透明背景」白名單
                const transparentPages = [
                    '/pages/products/color-ppf/',
                    '/pages/dealers/',
                    '/pages/dealers/ai-preview/',
                    '/pages/distributor/join/',
                    '/pages/distributor/dap/',
                    '/pages/about/'
                ];
                
                let isTransparent = false;
                // 如果是首頁或在白名單內
                if (path === '/' || path.endsWith('aks-official-website/') || path.endsWith('index.html')) {
                    isTransparent = true; 
                } else {
                    isTransparent = transparentPages.some(keyword => path.includes(keyword));
                }

                // 若非透明頁面，啟動防護罩與自動下推
                if (!isTransparent) {
                    header.classList.add('force-solid');
                    document.body.classList.add('has-solid-header'); 
                }

                // 滾動收起與變色
                let lastScrollTop = window.pageYOffset || document.documentElement.scrollTop;
                window.addEventListener('scroll', function() {
                    let currentScroll = window.pageYOffset || document.documentElement.scrollTop;
                    if (currentScroll > 50) header.classList.add('is-scrolled');
                    else header.classList.remove('is-scrolled');
                    
                    if (currentScroll > lastScrollTop && currentScroll > 200) header.classList.add('is-hidden');
                    else header.classList.remove('is-hidden');
                    
                    lastScrollTop = currentScroll <= 0 ? 0 : currentScroll; 
                }, false);
            }

            // 3. 手機版選單開關
            const mobileToggle = document.querySelector('.aks-mobile-toggle');
            const mobileMenu = document.querySelector('.aks-mobile-menu');
            const mobileClose = document.querySelector('.aks-mobile-close');

            if(mobileToggle && mobileMenu && mobileClose) {
                mobileToggle.addEventListener('click', () => {
                    mobileMenu.classList.add('is-open');
                    document.body.style.overflow = 'hidden'; 
                });
                mobileClose.addEventListener('click', () => {
                    mobileMenu.classList.remove('is-open');
                    document.body.style.overflow = '';
                });
            }

            // 4. 手機版手風琴子選單展開
            const mobileItems = document.querySelectorAll('.aks-mobile-item.aks-has-sub');
            mobileItems.forEach(item => {
                const link = item.querySelector('.aks-mobile-link');
                link.addEventListener('click', () => {
                    const isActive = item.classList.contains('is-active');
                    mobileItems.forEach(el => el.classList.remove('is-active'));
                    if(!isActive) item.classList.add('is-active');
                });
            });
        });
    </script>
</body>
</html>
