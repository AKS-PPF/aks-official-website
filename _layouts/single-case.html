---
layout: default
---
<style>
    #aks-case-root { width: 100%; background-color: #050505; color: #f3f3f5; padding-bottom: 120px; font-family: 'Montserrat', 'PingFang TC', sans-serif !important; }
    
    /* 1. 英雄橫幅 (展示最帥的完工角度) */
    .aks-case-hero {
        position: relative; width: 100%; height: 65vh; min-height: 400px;
        background-size: cover; background-position: center;
    }
    .aks-case-hero::before {
        content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(180deg, rgba(5,5,5,0.2) 0%, rgba(5,5,5,0.7) 70%, #050505 100%);
    }

    /* 2. 車型規格區塊 (浮動資訊卡) */
    .aks-case-spec-wrap { max-width: 1000px; margin: -60px auto 40px; position: relative; z-index: 10; padding: 0 25px; }
    .aks-case-spec-card {
        background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
        padding: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .aks-spec-item { border-left: 2px solid #c81f2a; padding-left: 15px; }
    .aks-spec-label { font-size: 12px; color: #777; text-transform: uppercase; margin-bottom: 5px; }
    .aks-spec-value { font-size: 18px; font-weight: 800; color: white; }

    /* 3. 內容排版 */
    .aks-case-body { max-width: 900px; margin: 0 auto; padding: 0 25px; }
    .aks-case-title { font-size: clamp(28px, 4vw, 42px); font-weight: 900; color: white; margin-bottom: 20px; text-align: center; }
    .aks-case-desc { font-size: 17px; line-height: 1.8; color: #aaa; margin-bottom: 50px; font-weight: 300; }
    
    /* 讓 Markdown 圖片自動變成精美畫廊 */
    .aks-case-content img { width: 100%; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
</style>

<div id="aks-case-root">
    <header class="aks-case-hero" style="background-image: url('{{ page.image }}');"></header>

    <div class="aks-case-spec-wrap io-reveal">
        <div class="aks-case-spec-card">
            <div class="aks-spec-item">
                <div class="aks-spec-label">Car Model</div>
                <div class="aks-spec-value">{{ page.car_model | default: "汽車精品" }}</div>
            </div>
            <div class="aks-spec-item">
                <div class="aks-spec-label">Film Color</div>
                <div class="aks-spec-value">{{ page.film_color | default: "AKS 改色犀牛皮" }}</div>
            </div>
            <div class="aks-spec-item">
                <div class="aks-spec-label">Location</div>
                <div class="aks-spec-value">{{ page.location | default: "AKS 配合店家" }}</div>
            </div>
        </div>
    </div>

    <article class="aks-case-body">
        <h1 class="aks-case-title io-reveal" data-delay="1">{{ page.title }}</h1>
        <div class="aks-case-content aks-font-clean io-reveal" data-delay="2">
            {{ content }}
        </div>
        
        <footer style="margin-top: 80px; text-align: center;">
            <a href="{{ '/pages/color-chart/' | relative_url }}" style="background:#c81f2a; color:white; padding:18px 40px; border-radius:6px; text-decoration:none; font-weight:800; letter-spacing:1px;">我也要這款配色 ➔</a>
        </footer>
    </article>
</div>
