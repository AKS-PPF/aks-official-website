---
layout: default
---
<style>
    #aks-case-root { width: 100%; background-color: #050505; color: #f3f3f5; padding: 60px 0 120px; font-family: 'Montserrat', 'PingFang TC', sans-serif !important; }
    
    .aks-case-wrapper { max-width: 1000px; margin: 0 auto; padding: 0 25px; }
    
    /* 1. 標題 */
    .aks-case-title { font-size: clamp(32px, 5vw, 48px); font-weight: 900; color: white; margin-bottom: 40px; text-align: center; line-height: 1.3; }
    
    /* 2. 首圖 (抓取縮圖，解決死圖問題) */
    .aks-case-hero-img { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
    .aks-case-hero-img img { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; }

    /* 3. 車型規格區塊 */
    .aks-case-spec-card {
        background: #111111; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px;
        padding: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px;
        margin-bottom: 60px;
    }
    .aks-spec-item { border-left: 2px solid #c81f2a; padding-left: 15px; }
    .aks-spec-label { font-size: 12px; color: #777; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.05em; }
    .aks-spec-value { font-size: 18px; font-weight: 800; color: white; }

    /* 4. 內容排版 */
    .aks-case-content { max-width: 900px; margin: 0 auto; font-size: 17px; line-height: 2.2; color: #d1d5db; font-weight: 300; letter-spacing: 0.05em; }
    .aks-case-content p { margin-bottom: 2rem; }
    .aks-case-content strong { color: white; font-weight: 700; background-color: rgba(200,31,42,0.1); padding: 0 4px; }
    
    .aks-case-content h2 { 
        font-size: 26px; font-weight: 800; color: white; margin: 4rem 0 2.5rem; 
        border-left: 4px solid #c81f2a; padding-left: 15px; 
    }

    .aks-case-content img { width: 100%; border-radius: 8px; margin-bottom: 3.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.6); display: block; }
    
    /* 5. 底部 CTA */
    .aks-case-footer { margin-top: 80px; text-align: center; }
    .aks-case-footer a { 
        display: inline-block; background: #c81f2a; color: white; padding: 18px 40px; 
        border-radius: 6px; text-decoration: none; font-weight: 800; letter-spacing: 0.1em;
        transition: 0.3s; box-shadow: 0 4px 15px rgba(200,31,42,0.3);
    }
    .aks-case-footer a:hover { background: #e02431; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(200,31,42,0.5); }
</style>

<div id="aks-case-root">
    <article class="aks-case-wrapper">
        
        <h1 class="aks-case-title io-reveal" data-delay="0">{{ page.title }}</h1>
        
        <div class="aks-case-hero-img io-reveal" data-delay="1">
            <img src="{% if page.image %}{{ page.image }}{% else %}{{ '/assets/images/og-image.png' | relative_url }}{% endif %}" alt="{{ page.title }}">
        </div>

        <div class="aks-case-spec-card io-reveal" data-delay="2">
            <div class="aks-spec-item">
                <div class="aks-spec-label">Car Model</div>
                <div class="aks-spec-value">{{ page.car_model | default: "汽車精品" }}</div>
            </div>
            <div class="aks-spec-item">
                <div class="aks-spec-label">Film Color</div>
                <div class="aks-spec-value">{{ page.film_color | default: "AKS 改色犀牛皮" }}</div>
            </div>
            <div class="aks-spec-item">
                <div class="aks-spec-label">Location</div>
                <div class="aks-spec-value">{{ page.location | default: "AKS 配合店家" }}</div>
            </div>
        </div>

        <div class="aks-case-content aks-font-clean io-reveal" data-delay="3">
            {{ content }}
        </div>
        
        <footer class="aks-case-footer io-reveal" data-delay="4">
            <a href="{{ page.cta_link | default: '/pages/color-chart/' | relative_url }}">我也要這款配色 ➔</a>
        </footer>

    </article>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const reveals = document.querySelectorAll('.io-reveal');
        reveals.forEach((el, i) => {
            const delay = el.getAttribute('data-delay') * 150 || 0;
            setTimeout(() => {
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
            }, 100 + delay);
        });
    });
</script>
