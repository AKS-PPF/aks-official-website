---
layout: default
---

<article class="w-full max-w-4xl mx-auto px-4 py-24 aks-font-clean text-gray-300 leading-relaxed">
    
    <header class="mb-12 border-b border-white/10 pb-8 text-center">
        <h1 class="text-3xl md:text-5xl font-bold text-white mb-4 tracking-widest">{{ page.title }}</h1>
        <p class="text-[#c81f2a] text-sm tracking-widest uppercase">{{ page.date | date: "%Y-%m-%d" }}</p>
    </header>

    <div class="prose prose-invert prose-red max-w-none">
        {{ content }}
    </div>

</article>
