<style>
  /* 1. 強制修正：杜絕所有超出 100vw 的橫向跑版問題 */
  .aks-dap-wrapper * { box-sizing: border-box !important; }
  .aks-dap-wrapper { width: 100%; overflow-x: hidden; }

  /* 2. 舊 CSS 隔離區 (所有選擇器前面都要加上 .aks-dap-wrapper) */
  .aks-dap-wrapper .aks-dap-section {
    --primary-red: #af111c;
    --bg-dark: #000000;
    --text-white: #ffffff;
    --line-green: #00b900;
    
    background-color: var(--bg-dark);
    color: var(--text-white);
    font-family: 'Montserrat', "PingFang TC", "Microsoft JhengHei", sans-serif;
    width: 100%;
  }

  /* 繼承已由全域 * { box-sizing: border-box !important; } 處理，此處保留原意即可 */
  .aks-dap-wrapper .aks-dap-section *,
  .aks-dap-wrapper .aks-dap-section *::before,
  .aks-dap-wrapper .aks-dap-section *::after {
    box-sizing: inherit;
  }

  /* ====== 橫幅區塊 ====== */
  .aks-dap-wrapper .aks-dap-hero {
    height: 450px;
    width: 100%;
    background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                      url('https://aks-ppf.github.io/images/ui/distributor/dap-bn.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 20px;
    position: relative;
    animation: aksSlideInDown 1s ease-out;
  }

  .aks-dap-wrapper .aks-dap-hero h1 {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 700;
    margin: 0;
    letter-spacing: 2px;
  }

  @media (max-width: 768px) {
    .aks-dap-wrapper .aks-dap-hero {
      height: 200px;
    }
  }

  /* ====== 內容區塊 ====== */
  .aks-dap-wrapper .aks-dap-content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 20px 100px;
  }

  /* 上方長條框 */
  .aks-dap-wrapper .aks-dap-top-bar {
    width: 100%;
    border: 2px solid var(--primary-red);
    border-radius: 8px;
    padding: 25px 40px;
    margin-bottom: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px; /* 電腦版模擬文字間的空白距離 */
    font-size: 1.6em;
    font-weight: bold;
    letter-spacing: 2px;
    opacity: 0;
    animation: aksFadeInUp 0.8s ease-out forwards;
    animation-delay: 0.2s;
  }

  .aks-dap-wrapper .aks-dap-top-bar i {
    font-size: 1.2em;
    color: var(--text-white);
  }

  /* 新增：將內容分組以利手機版折行，電腦版保持同行 */
  .aks-dap-wrapper .aks-dap-bar-group {
    display: flex;
    align-items: center;
    gap: 20px; /* 電腦版 icon 與文字的間距，與原本相同 */
  }

  @media (max-width: 768px) {
    .aks-dap-wrapper .aks-dap-top-bar {
      font-size: 1.2em;
      padding: 20px 15px;
      flex-direction: column; /* 手機版改為垂直折行 */
      gap: 10px; /* 上下兩行的間距 */
    }
    .aks-dap-wrapper .aks-dap-bar-group {
      gap: 12px; /* 手機版 icon 與文字的間距 */
    }
  }

  /* 下方特色卡片網格 */
  .aks-dap-wrapper .aks-dap-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
  }

  @media (max-width: 768px) {
    .aks-dap-wrapper .aks-dap-grid {
      grid-template-columns: 1fr;
    }
  }

  .aks-dap-wrapper .aks-dap-card {
    border: 2px solid var(--primary-red);
    border-radius: 8px;
    background-color: rgba(0,0,0,0.3);
    padding: 40px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: aksFadeInUp 0.8s ease-out forwards;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  
  .aks-dap-wrapper .aks-dap-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 20px rgba(175, 17, 28, 0.2);
  }

  /* 卡片動畫延遲 */
  .aks-dap-wrapper .aks-dap-card:nth-child(1) { animation-delay: 0.4s; }
  .aks-dap-wrapper .aks-dap-card:nth-child(2) { animation-delay: 0.6s; }
  .aks-dap-wrapper .aks-dap-card:nth-child(3) { animation-delay: 0.8s; }

  /* 數字與右上角紅點設計 */
  .aks-dap-wrapper .aks-dap-num {
    font-size: 5rem;
    font-weight: 900;
    font-family: Arial, sans-serif;
    line-height: 1;
    margin-bottom: 25px;
    position: relative;
    display: inline-block;
    z-index: 1;
  }

  .aks-dap-wrapper .aks-dap-num::after {
    content: '';
    position: absolute;
    top: 5px;
    right: -8px;
    width: 22px;
    height: 22px;
    background-color: var(--primary-red);
    border-radius: 50%;
    z-index: -1;
  }

  .aks-dap-wrapper .aks-dap-card p {
    font-size: 1.2em;
    line-height: 1.6;
    letter-spacing: 1px;
    margin: 0;
  }

  /* ====== 動畫定義 ====== */
  @keyframes aksSlideInDown {
    from { transform: translateY(-50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  @keyframes aksFadeInUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>

        </div>

        <div class="aks-dap-card">
