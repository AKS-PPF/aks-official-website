<div class="aks-warranty-query-wrapper">
  <section class="warranty-section">
    <div class="warranty-card" id="queryCard">
      <h2 class="warranty-title">保固查詢</h2>

      <div id="mode-select" class="mode-select">
        <label>
          <input type="radio" name="mode" value="serial" checked>
          保固序號查詢
        </label>
        <label>
          <input type="radio" name="mode" value="car">
          車主＆車牌查詢
        </label>
      </div>

      <div id="form-area" class="form-area">
        <div id="serial-form">
          <div class="serial-row">
            <div class="serial-prefix">AKS</div>
            <input
              id="warrantyDigits"
              class="serial-input"
              type="text"
              inputmode="numeric"
              maxlength="6"
              placeholder="輸入 6 位數字">
          </div>
        </div>

        <div id="car-form" style="display:none;">
          <input
            id="name"
            class="full-input"
            type="text"
            placeholder="請輸入車主姓名">
          <input
            id="license"
            class="full-input"
            type="text"
            placeholder="請輸入車牌號碼">
        </div>

        <button id="check" class="query-btn">查詢</button>
      </div>
    </div>

    <div id="result" class="result"></div>
  </section>
</div>

<script>
  const QUERY_API = "https://script.google.com/macros/s/AKfycbzeoqvEIhCed_5CBtu7kAQYQ7nA9WekvwTXU2-K9zrqqOZe03PXsX2X2ODg3Q6qk2dD/exec";

  const serialForm = document.getElementById("serial-form");
  const carForm = document.getElementById("car-form");
  const resultEl = document.getElementById("result");
  const queryCard = document.getElementById("queryCard");

  function norm(v) {
    return String(v || "").replace(/\u3000/g, " ").replace(/\s+/g, " ").trim();
  }

  function normLicense(v) {
    return norm(v).toUpperCase().replace(/[^A-Z0-9]/g, "");
  }

  function normDigits6(v) {
    return String(v || "").replace(/\D/g, "").slice(0, 6);
  }

  function buildWarrantyNo(d6) {
    return (d6 && d6.length === 6) ? ("AKS" + d6) : "";
  }

  function escapeHtml(str) {
    return String(str || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function renderNote(note) {
    const n = norm(note);
    if (!n) return "";
    return `<br><b>備註：</b>${escapeHtml(n)}`;
  }

  const digitsEl = document.getElementById("warrantyDigits");
  digitsEl.addEventListener("input", () => {
    const next = normDigits6(digitsEl.value);
    if (next !== digitsEl.value) digitsEl.value = next;
  });
  digitsEl.addEventListener("blur", () => {
    digitsEl.value = normDigits6(digitsEl.value);
  });

  const licenseEl = document.getElementById("license");
  licenseEl.addEventListener("blur", () => {
    licenseEl.value = normLicense(licenseEl.value);
  });

  document.querySelectorAll("input[name='mode']").forEach((radio) => {
    radio.addEventListener("change", () => {
      if (radio.value === "serial") {
        serialForm.style.display = "block";
        carForm.style.display = "none";
      } else {
        serialForm.style.display = "none";
        carForm.style.display = "block";
      }
      resultEl.innerHTML = "";
      queryCard.style.display = "block";
    });
  });

  document.getElementById("check").addEventListener("click", async () => {
    const mode = document.querySelector("input[name='mode']:checked").value;
    resultEl.innerHTML = "<div style='text-align:center;color:#555;'>⏳ 查詢中...</div>";

    let url = "";

    if (mode === "serial") {
      const d6 = normDigits6(digitsEl.value);
      const warrantyNo = buildWarrantyNo(d6);

      if (!warrantyNo) {
        alert("請輸入 6 位數字保固序號");
        resultEl.innerHTML = "";
        digitsEl.focus();
        return;
      }

      url = `${QUERY_API}?warrantyNo=${encodeURIComponent(warrantyNo)}`;
    } else {
      const name = norm(document.getElementById("name").value);
      const license = normLicense(licenseEl.value);

      if (!name || !license) {
        alert("請輸入姓名與車牌號碼");
        resultEl.innerHTML = "";
        return;
      }

      licenseEl.value = license;
      url = `${QUERY_API}?name=${encodeURIComponent(name)}&license=${encodeURIComponent(license)}`;
    }

    try {
      const res = await fetch(url);
      const data = await res.json();

      if (data.status === "success") {
        let html = "";

        if (Array.isArray(data.data)) {
          html = data.data.map((d) => {
            const product = escapeHtml(d.產品型號 || "");
            const installDate = escapeHtml(d.施工日期 || "");
            const expiry = escapeHtml(d.保固到期 || "");
            const store = escapeHtml(d.施工店家 || "");
            const installItem = escapeHtml(d.施工項目 || "");
            const wno = escapeHtml(d.保固序號 || "");
            const noteHtml = renderNote(d.備註);

            return `
              <div class="result-card">
                <b>產品型號：</b>${product}<br>
                <b>施工日期：</b>${installDate}<br>
                <b>施工項目：</b>${installItem || "—"}<br>
                <b>保固到期：</b>${expiry || "—"}<br>
                <b>施工店家：</b>${store}<br>
                <b>保固序號：</b>${wno || "—"}${noteHtml}
              </div>
            `;
          }).join("");
        } else {
          const d = data.data || {};
          const product = escapeHtml(d.產品型號 || "");
          const store = escapeHtml(d.施工店家 || "");
          const installDate = escapeHtml(d.施工日期 || "");
          const expiry = escapeHtml(d.保固到期 || "");
          const carModel = escapeHtml(d.車款 || "");
          const plate = escapeHtml(d.車牌 || "");
          const installItem = escapeHtml(d.施工項目 || "");
          const noteHtml = renderNote(d.備註);

          html = `
            <div class="result-card single">
              <b>產品型號：</b>${product}<br>
              <b>施工店家：</b>${store}<br>
              <b>施工日期：</b>${installDate}<br>
              <b>施工項目：</b>${installItem || "—"}<br>
              <b>保固到期：</b>${expiry || "—"}<br>
              <b>車款：</b>${carModel}<br>
              <b>車牌：</b>${plate}${noteHtml}
            </div>
          `;
        }

        html += `
          <button id="reset" class="reset-btn">🔁 重新查詢</button>
        `;

        resultEl.innerHTML = html;

        document.getElementById("reset").addEventListener("click", () => {
          resultEl.innerHTML = "";
          queryCard.style.display = "block";
          digitsEl.value = "";
          document.getElementById("name").value = "";
          licenseEl.value = "";
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

        queryCard.style.display = "none";
      } else {
        resultEl.innerHTML = `
          <div style="color:#a00;font-weight:500;">${escapeHtml(data.message || "查詢失敗")}</div>
          <button id="reset" class="reset-btn small">🔁 重新查詢</button>
        `;

        document.getElementById("reset").addEventListener("click", () => location.reload());
      }
    } catch (err) {
      console.error(err);
      resultEl.innerHTML = `
        <div style="color:#a00;">❌ 查詢時發生錯誤，請稍後再試。</div>
        <button id="reset" class="reset-btn small">🔁 重新查詢</button>
      `;

      document.getElementById("reset").addEventListener("click", () => location.reload());
    }
  });
</script>
