<style>
  .aks-dealers-kaohsiung-wrapper * {
    box-sizing: border-box !important;
  }

  .aks-dealers-kaohsiung-wrapper {
    width: 100%;
    overflow-x: hidden;
    background: #000;
    color: #fff;
    font-family: 'Montserrat', "PingFang TC", "Microsoft JhengHei", sans-serif;
  }

  .aks-dealers-kaohsiung-wrapper .red {
    color: #c81f2a;
  }

  /* ====== 橫幅大標題 ====== */
  .aks-dealers-kaohsiung-wrapper .hero-header {
    background-image:
      linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
      url('https://aks-ppf.github.io/images/ui/dealers/dealers-bn.png');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    height: 450px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
    overflow: hidden;
    padding-top: 10px;
  }

  .aks-dealers-kaohsiung-wrapper .hero-title {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 700;
    line-height: 1.4;
    color: #fff;
    margin: 0;
    padding: 10px 20px;
  }

  /* ====== 卡片網格容器 ====== */
  .aks-dealers-kaohsiung-wrapper .dealers-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 30px;
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  @media (min-width: 1024px) {
    .aks-dealers-kaohsiung-wrapper .dealers-grid {
      grid-template-columns: repeat(2, 1fr);
      padding: 60px 30px 100px;
      gap: 40px;
    }
  }

  /* ====== 店家精緻卡片 ====== */
  .aks-dealers-kaohsiung-wrapper .contact-section {
    position: relative;
    color: #fff;
    background: #050505;
    border: 1px solid #ffffff;
    border-radius: 12px;
    padding: 35px 30px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 25px;
  }

  /* ====== 核心修改：左上角「上眉標容器」(標籤 + FB + IG) ====== */
  .aks-dealers-kaohsiung-wrapper .card-top-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    /* 將下方的 h1 標題優雅推開 */
  }

  /* AI 特約標籤 */
  .aks-dealers-kaohsiung-wrapper .ai-badge {
    background: rgba(200, 31, 42, 0.5);
    text-align: center;
    color: #ffffff;
    padding: 0 12px;
    height: 28px;
    line-height: 28px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 4px;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .aks-dealers-kaohsiung-wrapper .ai-badge b {
    color: #dc2626;
  }

  /* 方形紅底社群 Icon 按鈕 */
  .aks-dealers-kaohsiung-wrapper .social-sq-btn {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(200, 31, 42, 0.5);
    /* 與 ai-badge 完全相同的紅底 */
    color: #ffffff;
    font-size: 15px;
    border-radius: 4px;
    text-decoration: none;
    transition: all 0.25s ease;
  }

  .aks-dealers-kaohsiung-wrapper .social-sq-btn:hover {
    background: #d31212;
    transform: translateY(-2px);
  }

  .aks-dealers-kaohsiung-wrapper .contact-info {
    width: 100%;
  }

  /* 標題設定：解除了 padding-right 限制，文字可完整延伸 */
  .aks-dealers-kaohsiung-wrapper .contact-info h1 {
    font-size: clamp(20px, 2.5vw, 26px);
    margin: 0 0 20px 0;
    font-weight: 800;
    line-height: 1.4;
  }

  .aks-dealers-kaohsiung-wrapper .contact-info ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .aks-dealers-kaohsiung-wrapper .contact-info li {
    font-size: 16px;
    line-height: 1.8;
    color: #aaa;
    margin-bottom: 4px;
  }

  .aks-dealers-kaohsiung-wrapper .contact-info li span {
    color: #fff;
    font-weight: 500;
  }

  /* ====== 視覺區塊 (Logo & 地圖) ====== */
  .aks-dealers-kaohsiung-wrapper .contact-visual {
    display: flex;
    gap: 0;
    flex-wrap: nowrap;
    width: 100%;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #1f1f22;
  }

  .aks-dealers-kaohsiung-wrapper .logo-box,
  .aks-dealers-kaohsiung-wrapper .map-box {
    width: 50%;
    aspect-ratio: 1 / 1;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    margin: 0;
    padding: 0;
    min-width: 0;
    background: #0a0a0a;
  }

  .aks-dealers-kaohsiung-wrapper .logo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .aks-dealers-kaohsiung-wrapper .map-placeholder {
    width: 100%;
    height: 100%;
  }

  .aks-dealers-kaohsiung-wrapper .map-placeholder iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  /* ====== RWD 手機版設定 ====== */
  @media (max-width: 900px) {
    .aks-dealers-kaohsiung-wrapper .hero-header {
      height: 200px;
    }

    .aks-dealers-kaohsiung-wrapper .hero-title {
      font-size: clamp(24px, 5vw, 36px);
      padding: 8px 15px;
    }

    .aks-dealers-kaohsiung-wrapper .contact-section {
      padding: 30px 20px;
    }
  }
</style>
