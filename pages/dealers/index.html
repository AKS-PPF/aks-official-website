<style>
  .aks-dealers-index-wrapper * { box-sizing: border-box !important; }
  .aks-dealers-index-wrapper {

    font-family: 'Montserrat', 'Noto Sans TC', sans-serif;

    --bg-black: #0a0a0a;
    --card-bg: #161616;
    --text-gray: #a0a0a0;
    --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  .aks-dealers-index-wrapper .hero-banner {
    background-image:
      linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
      url('https://cdn.cybassets.com/s/files/26096/ckeditor/pictures/content_657a7762-7c60-4bd5-a161-6d84bbb4679a.png');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    height: 450px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
    overflow: hidden;
    padding-top: 10px;
  }

  .aks-dealers-index-wrapper .hero-banner h1 {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin: 0;
  }

  .aks-dealers-index-wrapper .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 20px;
  }

  .aks-dealers-index-wrapper .store-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
  }

  .aks-dealers-index-wrapper .store-card {
    background: var(--card-bg);
    border: 1px solid #333;
    border-radius: 14px;
    padding: 40px 20px;
    text-decoration: none;
    color: #ffffff;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: var(--transition);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-width: 0;
  }

  @media (min-width: 768px) {
    .aks-dealers-index-wrapper .store-card.special {
      grid-column: span 2;
    }
  }

  .aks-dealers-index-wrapper .store-card:hover {
    border-color: var(--primary-red);
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(200, 31, 42, 0.2);
    color: #ffffff;
  }

  .aks-dealers-index-wrapper a:hover {
    color: #c81f2a;
  }

  .aks-dealers-index-wrapper .store-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(200, 31, 42, 0.1), transparent);
    transition: 0.5s;
  }

  .aks-dealers-index-wrapper .store-card:hover::before {
    left: 100%;
  }

  .aks-dealers-index-wrapper .store-card h3 {
    font-size: 1.5rem;
    margin: 0 0 10px 0;
    letter-spacing: 2px;
  }

  .aks-dealers-index-wrapper .store-card.special h3 {
    color: var(--primary-red);
  }

  .aks-dealers-index-wrapper .store-card p {
    font-size: 0.9rem;
    color: var(--text-gray);
    text-transform: uppercase;
    margin: 0;
  }

  @media (max-width: 480px) {
    .aks-dealers-index-wrapper .hero-banner {
      height: 30vh;
    }

    .aks-dealers-index-wrapper .store-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
