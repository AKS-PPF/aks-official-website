---
layout: page
<!-- title: 404 找不到網頁 | AKS PPF -->
---

<style>
  /* 1. 強制修正：杜絕所有超出 100vw 的橫向跑版問題 */
  .aks-404-wrapper * { box-sizing: border-box !important; }
  .aks-404-wrapper { 
    width: 100%; 
    overflow-x: hidden; 
    
    /* 繼承原 body 的設定與全域變數 */
    --primary-red: #c81f2a;
    --bg-dark: #050505;
    --text-white: #ffffff;
    --text-gray: #aaaaaa;

    background-color: var(--bg-dark);
    color: var(--text-white);
    font-family: 'Montserrat', "PingFang TC", "Microsoft JhengHei", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    /* 扣除全域 header 預設的 85px，維持畫面完美置中 */
    min-height: calc(100vh - 85px); 
    text-align: center;
    padding: 20px;
  }

  /* 404 視覺大字 */
  .aks-404-wrapper .aks-404-glitch {
    font-size: clamp(80px, 15vw, 150px);
    font-weight: 900;
    line-height: 1;
    margin-bottom: 10px;
    color: var(--text-white);
    text-shadow: 4px 4px 0px rgba(200, 31, 42, 0.4);
    animation: fadeInUp 0.8s ease forwards 0.2s;
    opacity: 0;
  }

  /* 2. 醒目的標題與圖示 */
  .aks-404-wrapper .aks-404-title {
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    animation: fadeInUp 0.8s ease forwards 0.4s;
    opacity: 0;
    letter-spacing: 0.05em;
  }
  .aks-404-wrapper .aks-404-title i {
    color: var(--primary-red);
  }

  /* 說明文字與倒數計時 */
  .aks-404-wrapper .aks-404-desc {
    font-size: clamp(14px, 3vw, 16px);
    color: var(--text-gray);
    margin-bottom: 40px;
    animation: fadeInUp 0.8s ease forwards 0.6s;
    opacity: 0;
    line-height: 1.8;
    letter-spacing: 0.05em;
  }
  .aks-404-wrapper .countdown {
    font-variant-numeric: tabular-nums;
    font-weight: bold;
    color: var(--primary-red);
    font-size: 1.1em;
  }

  /* 3. 回到首頁按鈕 */
  .aks-404-wrapper .aks-404-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background-color: var(--primary-red);
    color: var(--text-white);
    text-decoration: none;
    padding: 16px 40px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.15em;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(200, 31, 42, 0.3);
    animation: fadeInUp 0.8s ease forwards 0.8s;
    opacity: 0;
  }
  .aks-404-wrapper .aks-404-btn:hover {
    background-color: #a81a23;
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(200, 31, 42, 0.5);
  }

  /* 進場動畫 */
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<div class="aks-404-wrapper">
  
  <div class="aks-404-glitch">404</div>

  <h1 class="aks-404-title">
    <i class="fa-solid fa-triangle-exclamation"></i>
    哎呀！找不到網頁
  </h1>

  <p class="aks-404-desc">
    您所尋找的頁面可能已被移除、重新命名或暫時無法使用。<br>
    系統將在 <span class="countdown" id="timer">6</span> 秒後自動為您導向首頁。
  </p>

  <a href="/" class="aks-404-btn">
    <i class="fa-solid fa-house"></i> 回到首頁
  </a>

  <script>
    let timeLeft = 6;
    const timerElement = document.getElementById('timer');
    const countdown = setInterval(() => {
      timeLeft--;
      if (timerElement) {
        timerElement.textContent = timeLeft;
      }
      if (timeLeft <= 0) {
        clearInterval(countdown);
        // 原本的 meta refresh 被移除了，改由 JS 直接執行跳轉回首頁
        window.location.href = "/";
      }
    }, 1000);
  </script>

</div>
