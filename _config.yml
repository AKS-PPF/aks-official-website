# ==========================================
# AKS PPF 官方網站 - Jekyll 全域設定檔
# ==========================================

# 1. 網站基本資訊
title: AKS PPF 艾鎧斯車漆保護膜
email: info@aks-ppf.com
description: "AKS PPF 頂級車漆保護膜，提供改色犀牛皮、亮面、消光及天窗隔熱膜等全方位防護解決方案。"

# 2. 網址設定
url: "https://www.aks-ppf.com"
baseurl: ""

# 3. 編譯環境設定
markdown: kramdown
theme: minima

# 4. 宣告 Collections (全站三大動態資料庫設定)
collections:
  colors:
    output: true
    permalink: /pages/color-chart/:name/
  cases:
    output: true
    permalink: /cases/:name/
  articles:
    output: true
    permalink: /articles/:name/

# 5. 排除不需要編譯的檔案
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md

# 6. 外掛設定
plugins:
  - jekyll-sitemap
